name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run rubocop
        run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    name: Test ${{ matrix.ruby }}
    permissions:
      contents: read
      checks: write # the "Coverage" check run
    strategy:
      # Coverage is collected only for the last matrix entry.
      matrix:
        ruby:
          - '4.0.1'

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Enable coverage on the newest Ruby
        env:
          JOB_INDEX: ${{ strategy.job-index }}
          JOB_TOTAL: ${{ strategy.job-total }}
        run: if [ "$JOB_INDEX" -eq "$((JOB_TOTAL - 1))" ]; then echo 'COVERAGE=1' >> "$GITHUB_ENV"; fi

      - name: Run specs
        run: bundle exec rake spec:all

      - name: Report the coverage as a check run
        if: env.COVERAGE == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          # On pull_request the checkout is a merge commit, so attach the check to
          # the branch head, where the PR looks for it.
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          title=$(ruby -rjson -e 'puts JSON.parse(File.read("coverage/.last_run.json"))["result"].map { |criterion, percent| "#{criterion} #{percent}%" }.join(", ")')
          summary=$(ruby -rjson -e 'JSON.parse(File.read("coverage/.last_run.json"))["result"].each { |criterion, percent| puts "- #{criterion}: #{percent}%" }')
          gh api "repos/$REPOSITORY/check-runs" \
            --method POST \
            -f name="Coverage" \
            -f head_sha="$HEAD_SHA" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=$title" \
            -f "output[summary]=$summary

          The full HTML report is in the run's \`coverage-report\` artifact."

      - name: Upload the coverage report
        if: env.COVERAGE == '1'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

  mutant:
    runs-on: ubuntu-latest
    name: Mutation tests
    # Mutation testing is slow; run it only after a merge into main, never for
    # pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      checks: write # the "Mutant" check run

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run the mutation tests
        # Mutant exits non-zero whenever mutations survive, which is the normal
        # state. The coverage is reported by the check run below; only a run
        # without a coverage result (see below) fails this job.
        run: bundle exec rake spec:mutant | tee mutant.log || true

      - name: Upload the mutation testing results
        uses: actions/upload-artifact@v7
        with:
          name: mutant-report
          path: .mutant/
          # Without this the upload skips the hidden .mutant/ directory entirely.
          include-hidden-files: true
          if-no-files-found: error

      - name: Report the mutation coverage as a check run
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          percent=$(ruby -e 'puts File.read("mutant.log")[/^Coverage:\s+([\d.]+)%/, 1] || abort("No coverage in the mutant output - did mutant crash?")')
          gh api "repos/$REPOSITORY/check-runs" \
            --method POST \
            -f name="Mutant" \
            -f head_sha="$HEAD_SHA" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=mutation $percent%" \
            -f "output[summary]=- mutation: $percent%

          The full results are in the run's \`mutant-report\` artifact."
